<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ChessPanda Lab — Micro</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="page">

    <header class="header">
      <div class="brand">
        <div class="dot"></div>
        <div>
          <div class="kicker">ChessPanda</div>
          <h1>Micro</h1>
        </div>
      </div>
      <p class="sub">
        A running log. Add new entries at the top. Short, dated, practical.
      </p>
    </header>

    <section class="feed">
      <pre id="log">
2026-02-20 — Hmmz.
2026-02-20 — Testing
2026-02-20 — Lab site is live. Goal: low-friction notes that stay off the parent-facing site.
2026-02-20 — If the page looks "old", it's probably browser cache.

      </pre>
    </section>

  </main>

<script>
const log = document.getElementById("log");
const lines = log.innerText.trim().split("\n").reverse();

log.innerHTML = lines.map(line => {
  const parts = line.split("—");
  if (parts.length < 2) return "";
  return `
    <div class="entry">
      <div class="meta">${parts[0].trim()}</div>
      <div class="text">${parts.slice(1).join("—").trim()}</div>
    </div>
  `;
}).join("");
</script>

</body>
</html>
