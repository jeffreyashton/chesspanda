<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ChessPanda Lab — Micro</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="page">

    <header class="header">
      <div class="brand">
        <div class="dot"></div>
        <div>
          <div class="kicker">ChessPanda</div>
          <h1>Micro</h1>
        </div>
      </div>
      <p class="sub">
        A running log. Add new entries at the top. Short. Dated automatically.
      </p>
    </header>

    <section class="feed">

      <!--
        HOW TO POST:

        Add new lines at the TOP of log-data below.

        You can write:
          Just text → auto-adds today's date
          OR
          2026-02-20 — Your text → uses your manual date
      -->

      <div id="log-data" style="display:none;">
        Testing again!
New idea about lesson structure.
If the page looks "old", it's probably browser cache.
2026-02-20 — Lab site is live. Goal: low-friction notes that stay off the parent-facing site.
      </div>

      <div id="feed-output"></div>

    </section>

  </main>

<script>
function todayISO() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  return `${y}-${m}-${day}`;
}

const rawLines = document
  .getElementById("log-data")
  .innerText
  .split("\n")
  .map(line => line.trim())
  .filter(Boolean);

const today = todayISO();

const rendered = rawLines.map(line => {
  if (line.includes("—")) {
    const parts = line.split("—");
    const date = parts[0].trim();
    const text = parts.slice(1).join("—").trim();
    return `
      <div class="entry">
        <div class="meta">${date}</div>
        <div class="text">${text}</div>
      </div>
    `;
  }

  return `
    <div class="entry">
      <div class="meta">${today}</div>
      <div class="text">${line}</div>
    </div>
  `;
}).join("");

document.getElementById("feed-output").innerHTML = rendered;
</script>

</body>
</html>
